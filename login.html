<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>

  <!-- ===== Navbar ===== -->
  <header class="navbar">
    <div class="logo">
      <img src="cu-logo.jpg" alt="CU Logo" class="logo-img">
      <span>Capitol University</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== Login Form ===== -->
  <section class="form-section">
    <h1>Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Student Email / ID</label>
        <input type="text" id="email" name="email" placeholder="Enter your email or ID">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
      </div>
      <button type="submit" class="btn-primary">Login</button>
      <p class="form-links">
        <a href="register.html">Don’t have an account? Register</a> | 
        <a href="#">Forgot Password?</a>
      </p>
    </form>
  </section>

  <!-- ===== Footer ===== -->
  <footer>
    <img src="cu-logo.jpg" alt="CU Logo" class="footer-logo">
    <p>&copy; 2026 Capitol University | Campus Lost & Found</p>
    <p>Contact: lostfound@capitol.edu</p>
  </footer>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
