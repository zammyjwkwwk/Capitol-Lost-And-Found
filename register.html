<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>

  <!-- ===== Navbar ===== -->
  <header class="navbar">
    <div class="logo">
      <img src="cu-logo.jpg" alt="CU Logo" class="logo-img">
      <span>Capitol University</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== Register Form ===== -->
  <section class="form-section">
    <h1>Create Account</h1>
    <form id="registerForm">
      <div class="form-group">
        <label for="regEmail">Student Email</label>
        <input type="email" id="regEmail" name="regEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" name="regPassword" placeholder="Enter your password">
      </div>
      <button type="submit" class="btn-primary">Register</button>
      <p class="form-links">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </form>
  </section>

  <!-- ===== Footer ===== -->
  <footer>
    <img src="cu-logo.jpg" alt="CU Logo" class="footer-logo">
    <p>&copy; 2026 Capitol University | Campus Lost & Found</p>
    <p>Contact: lostfound@capitol.edu</p>
  </footer>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
